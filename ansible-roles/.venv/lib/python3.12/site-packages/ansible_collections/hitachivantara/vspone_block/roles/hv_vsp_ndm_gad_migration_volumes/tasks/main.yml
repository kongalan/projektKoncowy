---
# ###################################################################
# Role: hv_vsp_ndm_gad_migration_volumes
# Description: Create GAD pairs with complete infrastructure setup
# ###################################################################

# ###################################################################
# Task: Process input LDEVs from GAD status file
# ###################################################################

- name: Process input LDEVs from GAD status file
  ansible.builtin.set_fact:
    hv_vsp_ndm_gad_migration_volumes_local_device_group_name: "{{ hv_vsp_ndm_gad_migration_volumes_copy_group_name }}P_"
    hv_vsp_ndm_gad_migration_volumes_remote_device_group_name: "{{ hv_vsp_ndm_gad_migration_volumes_copy_group_name }}S_"
####################################################################

###################################################################
# swap-split gad pairs non-Disruptively
###################################################################
- name: Swap-Split All Remote Copy Group for GAD
  hitachivantara.vspone_block.vsp.hv_remote_copy_group:
    connection_info: "{{ secondary_connection_info }}"
    secondary_connection_info: "{{ connection_info }}"
    state: "swap_split"
    spec:
      local_device_group_name: "{{ hv_vsp_ndm_gad_migration_volumes_remote_device_group_name }}"
      remote_device_group_name: "{{ hv_vsp_ndm_gad_migration_volumes_local_device_group_name }}"
      copy_group_name: "{{ hv_vsp_ndm_gad_migration_volumes_copy_group_name }}"
      replication_type: "GAD"

  register: hv_vsp_ndm_gad_migration_volumes_swap_split_result

- name: Debug the result variable
  ansible.builtin.debug:
    var: hv_vsp_ndm_gad_migration_volumes_swap_split_result

# ###################################################################
# # Swap and Resync GAD pairs non-Disruptively
# ###################################################################
- name: Swap-Resync Remote Copy Group for GAD
  hitachivantara.vspone_block.vsp.hv_remote_copy_group:
    connection_info: "{{ secondary_connection_info }}"
    secondary_connection_info: "{{ connection_info }}"
    state: "swap_resync"
    spec:
      local_device_group_name: "{{ hv_vsp_ndm_gad_migration_volumes_remote_device_group_name }}"
      remote_device_group_name: "{{ hv_vsp_ndm_gad_migration_volumes_local_device_group_name }}"
      copy_group_name: "{{ hv_vsp_ndm_gad_migration_volumes_copy_group_name }}"
      replication_type: "GAD"

  register: hv_vsp_ndm_gad_migration_volumes_swap_resync_result

- name: Debug the result variable
  ansible.builtin.debug:
    var: hv_vsp_ndm_gad_migration_volumes_swap_resync_result

###################################################################
# Split the GAD pairs to complete migration
###################################################################
- name: Split the GAD pairs to complete migration
  hitachivantara.vspone_block.vsp.hv_remote_copy_group:
    connection_info: "{{ connection_info }}"
    secondary_connection_info: "{{ secondary_connection_info }}"
    state: "split"
    spec:
      local_device_group_name: "{{ hv_vsp_ndm_gad_migration_volumes_local_device_group_name }}"
      remote_device_group_name: "{{ hv_vsp_ndm_gad_migration_volumes_remote_device_group_name }}"
      copy_group_name: "{{ hv_vsp_ndm_gad_migration_volumes_copy_group_name }}"
      replication_type: "GAD"

  register: hv_vsp_ndm_gad_migration_volumes_split_result

- name: Debug the result variable
  ansible.builtin.debug:
    var: hv_vsp_ndm_gad_migration_volumes_split_result

###################################################################
# Delete the migrated gad pairs from source system
###################################################################

- name: Delete all GAD pairs using Remote Copy Group
  hitachivantara.vspone_block.vsp.hv_remote_copy_group:
    connection_info: "{{ connection_info }}"
    secondary_connection_info: "{{ secondary_connection_info }}"
    state: "absent"
    spec:
      local_device_group_name: "{{ hv_vsp_ndm_gad_migration_volumes_local_device_group_name }}"
      remote_device_group_name: "{{ hv_vsp_ndm_gad_migration_volumes_remote_device_group_name }}"
      copy_group_name: "{{ hv_vsp_ndm_gad_migration_volumes_copy_group_name }}"

  register: hv_vsp_ndm_gad_migration_volumes_delete_result

- name: Debug the result variable
  ansible.builtin.debug:
    var: hv_vsp_ndm_gad_migration_volumes_delete_result

####################################################################
# Task: Generate comprehensive GAD pair migration report
####################################################################
# cspell:ignore ldevs selectattr equalto
- name: Generate GAD pair migration report
  ansible.builtin.set_fact:
    hv_vsp_ndm_gad_migration_volumes_gad_migration_report:
      migration_summary:
        copy_group_name: "{{ hv_vsp_ndm_gad_migration_volumes_copy_group_name }}"
        local_device_group: "{{ hv_vsp_ndm_gad_migration_volumes_local_device_group_name }}"
        remote_device_group: "{{ hv_vsp_ndm_gad_migration_volumes_remote_device_group_name }}"
        swap_split_completed: "{{ hv_vsp_ndm_gad_migration_volumes_swap_split_result.changed | default(false) if hv_vsp_ndm_gad_migration_volumes_swap_split_result
          is defined else false }}"
        swap_resync_completed: "{{ hv_vsp_ndm_gad_migration_volumes_swap_resync_result.changed | default(false) if hv_vsp_ndm_gad_migration_volumes_swap_resync_result
          is defined else false }}"
        deletion_completed: "{{ hv_vsp_ndm_gad_migration_volumes_delete_result.changed | default(false) if hv_vsp_ndm_gad_migration_volumes_delete_result is defined
          else false }}"
      detailed_results:
        last_operation_result: "{{ hv_vsp_ndm_gad_migration_volumes_delete_result | default({}) }}"
        timestamp: "{{ now(utc=true, fmt='%Y-%m-%dT%H:%M:%SZ') }}"

- name: Display GAD pair migration report
  ansible.builtin.debug:
    msg:
      - "=== GAD PAIR MIGRATION REPORT ==="
      - "Copy Group: {{ hv_vsp_ndm_gad_migration_volumes_copy_group_name }}"
      - "Local Device Group: {{ hv_vsp_ndm_gad_migration_volumes_local_device_group_name }}"
      - "Remote Device Group: {{ hv_vsp_ndm_gad_migration_volumes_remote_device_group_name }}"
      - "Swap-Split Status: {{ 'completed' if hv_vsp_ndm_gad_migration_volumes_gad_migration_report.migration_summary.swap_split_completed else 'not executed or failed'
        }}"
      - "Swap-Resync Status: {{ 'completed' if hv_vsp_ndm_gad_migration_volumes_gad_migration_report.migration_summary.swap_resync_completed else 'not executed or
        failed' }}"
      - "Deletion Status: {{ 'completed' if hv_vsp_ndm_gad_migration_volumes_gad_migration_report.migration_summary.deletion_completed else 'not executed or failed'
        }}"
      - "Report Generated: {{ hv_vsp_ndm_gad_migration_volumes_gad_migration_report.detailed_results.timestamp }}"
