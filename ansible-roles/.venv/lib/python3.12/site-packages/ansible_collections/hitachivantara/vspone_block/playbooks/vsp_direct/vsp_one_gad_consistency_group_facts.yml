---
# ###################################################################
# Example : VSP One GAD consistency group facts Playbook
# ###################################################################
- name: VSP One GAD consistency group facts
  hosts: localhost
  gather_facts: false

  vars_files:
    - ../ansible_vault_vars/ansible_vault_storage_var.yml

  vars:
    # Common connection info for all tasks
    connection_info:
      address: "{{ storage_address }}"
      username: "{{ vault_storage_username }}"
      password: "{{ vault_storage_secret }}"

    secondary_connection_info:
      address: "{{ secondary_storage_address }}"
      username: "{{ vault_secondary_storage_username }}"
      password: "{{ vault_secondary_storage_secret }}"

  tasks:
    # ###################################################################
    # Task Name : Get all consistency groups for GAD pairs
    # This returns only important properties. For deatils, use the
    # "Get specific consistency group for GAD pairs" playbook
    # ###################################################################
    - name: Get all consistency groups for GAD pairs
      hitachivantara.vspone_block.vsp.hv_vsp_one_gad_consistency_group_facts:
        connection_info: "{{ connection_info }}"
        secondary_connection_info: "{{ secondary_connection_info }}"
      register: result

    - name: Debug the result variable
      ansible.builtin.debug:
        var: result

    # ###################################################################
    # Task Name : Get specific consistency group for GAD pairs
    # ###################################################################
    - name: Get specific consistency group for GAD pairs
      hitachivantara.vspone_block.vsp.hv_vsp_one_gad_consistency_group_facts:
        connection_info: "{{ connection_info }}"
        secondary_connection_info: "{{ secondary_connection_info }}"
        spec:
          consistency_group_id: 0
      register: result

    - name: Debug the result variable
      ansible.builtin.debug:
        var: result
