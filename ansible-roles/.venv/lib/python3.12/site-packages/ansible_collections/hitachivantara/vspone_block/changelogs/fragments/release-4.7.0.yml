    "parity_group" (hv_ldev, hv_ldev_facts), "remote_ip_address" (hv_sds_block_remote_iscsi_port),
    "start_volume_id" (hv_vsp_one_volume_facts), "mirror_unit_id", "primary_journal_pool",
    "secondary_journal_pool" (hv_hur), "mirror_unit_id", "pvol_status", "svol_status",
    "primary_storage_serial", "secondary_storage_serial", "primary_journal_pool", "secondary_journal_pool"
    (hv_hur_facts), "mu_number" (hv_gad), "pvol_status", "svol_status", "storage_serial_number"
    (hv_truecopy, hv_truecopy_facts, hv_hur), "secondary_storage_serial" (hv_hur),
