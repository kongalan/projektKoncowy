---
release_summary: |
  This release adds support for VSP One SDS Block version 1.19.00, SVOS 9.8.7 for VSP 5100/5500 &
  VSP 5200/5600, SVOS 10.5.2 for VSP One B24/B26/B28, and Ansible core version 2.20. It introduces
  new bulk modules for GAD, host groups, HUR, iSCSI targets, LDEVs, and TrueCopy, new automation
  roles for GAD, HUR, quorum disk, and journal provisioning, and renames multiple input and output
  parameters across many modules for improved consistency. Two deprecated playbooks have also been
  removed.

minor_changes:
  - Added support for VSP One SDS Block version 1.19.00.
  - Added support for SVOS 9.8.7 for VSP 5100/5500 & VSP 5200/5600 storage models.
  - Added support for SVOS 10.5.2 for VSP One B24/B26/B28 storage models.
  - Added support for Ansible core version 2.20.
  - Added a new "hv_gad_bulk" module for batch creation of multiple GAD pairs on VSP block storage systems.
  - Added a new "hv_hg_bulk" module for bulk host group management operations with multithreading support for parallel
    processing across multiple ports on VSP block storage systems.
  - Added a new "hv_hur_bulk" module for bulk creation of HUR pairs on VSP block storage systems.
  - Added a new "hv_iscsi_target_bulk" module for bulk iSCSI target management operations with multithreading support
    for parallel processing across multiple ports on VSP block storage systems.
  - Added a new "hv_ldev_bulk" module for bulk operations on logical devices (LDEVs) on VSP block storage systems.
  - Added a new "hv_truecopy_bulk" module for bulk creation of TrueCopy pairs in VSP block storage systems.
  - Added new "hv_vsp_create_primary_and_secondary_diskless_quorum_disk" role for automated diskless quorum disk
    creation on VSP block storage systems.
  - Added new "hv_vsp_gad_pairs_creation" role to automate GAD pairs provisioning on VSP block storage systems.
  - Added new "hv_vsp_hur_pairs_creation" role to automate HUR pairs provisioning on VSP block storage systems.
  - Added new "hv_vsp_create_primary_and_secondary_quorum_disk" role for automated disk-based quorum disk creation
    on VSP block storage systems.
  - Added new "hv_vsp_primary_secondary_journal_creation" role for automated journal creation on VSP block storage
    systems.
  - Added support for input parameter "copy_pace" to the "hv_shadow_image_pair", "hv_gad", "hv_hur", "hv_truecopy",
    and "hv_journal" modules.
  - Added support to "hv_ldev" module to create ldev on a specific resource group.
  - Added support to "hv_resource_group" module to add multiple hostgroups by ids of a port to an existing Resource
    Group by ID.
  - Added support to "hv_resource_group" module to add multiple hostgroups by providing a range of IDs of a port to
    an existing Resource Group by ID.
  - Added support to "hv_resource_group" module to remove multiple hostgroups by ids of a port from an existing
    Resource Group by ID.
  - Added support to "hv_resource_group" module to remove multiple hostgroups by providing a range of IDs of a port
    from an existing Resource Group by ID.
  - Added support to "hv_storagepool" module to stop the shrink operation of a storage pool.

bugfixes:
  - Fixed performance for "hv_snapshot_group_facts" module.

