---
# tasks file for roles/master
- name: Check if cluster already initialized
  stat:
    path: /etc/kubernetes/admin.conf
  register: kubeadm_admin_conf

- name: Initialize Kubernetes control-plane
  command: >
    kubeadm init
    --pod-network-cidr={{ pod_cidr }}
    --apiserver-advertise-address={{ ansible_host }}
  when: not kubeadm_admin_conf.stat.exists

- name: Create kube config dir for ubuntu user
  file:
    path: /home/ubuntu/.kube
    state: directory
    owner: ubuntu
    group: ubuntu
    mode: "0755"

- name: Copy admin kubeconfig
  copy:
    src: /etc/kubernetes/admin.conf
    dest: /home/ubuntu/.kube/config
    owner: ubuntu
    group: ubuntu
    mode: "0600"
    remote_src: true

- name: Install Flannel CNI
  become_user: ubuntu
  command: kubectl apply -f https://github.com/flannel-io/flannel/releases/latest/download/kube-flannel.yml
  environment:
    KUBECONFIG: /home/ubuntu/.kube/config
  changed_when: false

- name: Generate worker join command
  command: kubeadm token create --print-join-command
  register: join_command
  changed_when: false

- name: Save join command
  set_fact:
    kubeadm_join_command: "{{ join_command.stdout }}"